spring:
  application:
    name: job-portal
  config:
    import: optional:file:.env[.properties]
  profiles:
    active: ${SPRING_PROFILES_ACTIVE:dev}
  jpa:
    open-in-view: false

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      probes:
        enabled: true

jwt:
  secret: ${JWT_SECRET:}
  expiration-ms: ${JWT_EXPIRATION_MS:3600000}
  refresh-expiration-ms: ${JWT_REFRESH_EXPIRATION_MS:1209600000}

app:
  cors:
    allowed-origins: ${APP_CORS_ALLOWED_ORIGINS:http://localhost:3000}

auth:
  rate-limit:
    login-by-ip:
      max-attempts: ${AUTH_RATE_LIMIT_LOGIN_BY_IP_MAX_ATTEMPTS:10}
      window-seconds: ${AUTH_RATE_LIMIT_LOGIN_BY_IP_WINDOW_SECONDS:900}
    login-by-email:
      max-attempts: ${AUTH_RATE_LIMIT_LOGIN_BY_EMAIL_MAX_ATTEMPTS:5}
      window-seconds: ${AUTH_RATE_LIMIT_LOGIN_BY_EMAIL_WINDOW_SECONDS:900}
    refresh-by-ip:
      max-attempts: ${AUTH_RATE_LIMIT_REFRESH_BY_IP_MAX_ATTEMPTS:20}
      window-seconds: ${AUTH_RATE_LIMIT_REFRESH_BY_IP_WINDOW_SECONDS:300}

logging:
  level:
    root: INFO
    org.springframework.security: INFO

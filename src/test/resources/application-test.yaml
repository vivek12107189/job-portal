spring:
  datasource:
    url: jdbc:h2:mem:jobportal;MODE=PostgreSQL;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
    username: sa
    password:
    driver-class-name: org.h2.Driver
  jpa:
    hibernate:
      ddl-auto: create-drop
  flyway:
    enabled: false

jwt:
  secret: test-secret-key-for-jwt-signing-123456789
  expiration-ms: 3600000
  refresh-expiration-ms: 1209600000

app:
  cors:
    allowed-origins: http://localhost:3000
